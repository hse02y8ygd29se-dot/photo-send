<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>工事前写真一覧PDF作成</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
      :root {
        --ink: #243026;
        --muted: #687267;
        --paper: #fbfaf6;
        --panel: #ffffff;
        --line: #d9d6cc;
        --accent: #5d6f5a;
        --accent-strong: #42523f;
        --warning: #ff7800;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(120deg, rgba(93, 111, 90, 0.08), transparent 34%),
          linear-gradient(180deg, #f5f2ea 0%, var(--paper) 42%, #f8f7f1 100%);
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      }

      main {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 18px 14px 36px;
      }

      header {
        padding: 12px 2px 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(1.45rem, 5vw, 2rem);
        line-height: 1.25;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      form {
        display: grid;
        gap: 14px;
      }

      section {
        display: grid;
        gap: 12px;
        padding: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(61, 64, 54, 0.08);
      }

      h2 {
        margin: 0;
        font-size: 1.05rem;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--ink);
        font-weight: 700;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        min-height: 46px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font-size: 16px;
      }

      textarea {
        min-height: 76px;
        resize: vertical;
      }

      input[type="file"] {
        padding: 12px;
        min-height: auto;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .photo-card {
        display: grid;
        gap: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffdfa;
      }

      .photo-card img {
        width: 100%;
        max-height: 260px;
        object-fit: contain;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f4f1e8;
      }

      .photo-title {
        font-weight: 700;
      }

      .actions {
        position: sticky;
        bottom: 0;
        padding: 12px 0 0;
        background: linear-gradient(180deg, transparent, var(--paper) 28%);
      }

      button {
        width: 100%;
        min-height: 50px;
        border: 0;
        border-radius: 8px;
        color: white;
        background: var(--accent);
        font-weight: 800;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      .status {
        min-height: 28px;
        color: var(--muted);
        font-weight: 700;
      }

      .error {
        color: #b42318;
      }

      @media (min-width: 680px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>工事前写真一覧PDF作成</h1>
        <p>写真と工事内容を入力すると、工務店へ送れるPDFを作成します。</p>
      </header>

      <form id="pdfForm">
        <section>
          <h2>基本情報</h2>
          <label>
            利用者名
            <input id="userName" autocomplete="name" />
          </label>
          <label>
            住所
            <textarea id="address" autocomplete="street-address"></textarea>
          </label>
          <label>
            写真の撮影日（全写真共通）
            <input id="shootingDate" type="date" />
          </label>
        </section>

        <section>
          <h2>写真</h2>
          <label>
            写真をアップロード
            <input id="photos" type="file" accept="image/jpeg,image/png,image/webp" multiple />
          </label>
          <div id="photoList"></div>
        </section>

        <div class="actions">
          <button id="pdfButton" type="submit">PDF作成</button>
          <div id="status" class="status" role="status" aria-live="polite"></div>
        </div>
      </form>
    </main>

    <script src="static/app.js?v=20260506-5"></script>
  </body>
</html>
